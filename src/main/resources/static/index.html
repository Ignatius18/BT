<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByteClub - Регистрация / Вход</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <h1>ByteClub</h1>

        <div class="tabs">
            <div id="tab-register" class="tab-button active" onclick="showTab('register')">Регистрация</div>
            <div id="tab-login" class="tab-button" onclick="showTab('login')">Вход</div>
        </div>

        <div id="register-form">
            <div class="form-group">
                <label for="register-username">Логин</label>
                <input id="register-username" type="text" placeholder="Введите логин">
            </div>
            <div class="form-group">
                <label for="register-email">Email</label>
                <input id="register-email" type="email" placeholder="Введите email">
            </div>
            <div class="form-group">
                <label for="register-password">Пароль</label>
                <input id="register-password" type="password" placeholder="Введите пароль">
            </div>
            <button onclick="submitRegister()">Зарегистрироваться</button>
        </div>

        <div id="login-form" style="display: none;">
            <div class="form-group">
                <label for="login-username">Логин</label>
                <input id="login-username" type="text" placeholder="Введите логин">
            </div>
            <div class="form-group">
                <label for="login-password">Пароль</label>
                <input id="login-password" type="password" placeholder="Введите пароль">
            </div>
            <button onclick="submitLogin()">Войти</button>
        </div>

        <div id="profile" class="profile" style="display: none;">
            <p id="profile-text"></p>
            <button class="logout-button" onclick="logout()">Выйти</button>
        </div>

        <div id="message" class="message"></div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
