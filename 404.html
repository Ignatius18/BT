<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Страница не найдена</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #f3f4f6; color: #111827; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .page { text-align: center; padding: 32px; background: #ffffff; border-radius: 16px; box-shadow: 0 24px 64px rgba(15,23,42,0.12); max-width: 520px; width: 100%; }
        h1 { font-size: 96px; margin: 0 0 16px; color: #111827; }
        p { font-size: 18px; margin: 0 0 24px; color: #475569; }
        a { display: inline-block; padding: 12px 24px; background: #2563eb; color: #ffffff; text-decoration: none; border-radius: 10px; }
        a:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <div class="page">
        <h1>404</h1>
        <p>Страница не найдена. Возможно, путь введён неправильно или страница была удалена.</p>
        <a href="./">Перейти на главную</a>
    </div>
</body>
</html>
